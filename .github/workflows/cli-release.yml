name: CLI Release

on:
  workflow_run:
    workflows: ["CLI Tests"]
    branches: ["main"]
    types:
      - completed

permissions:
  contents: read

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: Release CLI
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"
          scope: "@oasiz"

      - name: Install dependencies
        run: npm ci

      - name: Verify npm publish identity
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NODE_AUTH_TOKEN is not configured for this workflow." >&2
            exit 1
          fi

          echo "NODE_AUTH_TOKEN length: ${#NODE_AUTH_TOKEN}"
          echo "npm registry: $(npm config get registry)"
          echo "npm userconfig: $(npm config get userconfig)"
          echo "If NPM_TOKEN was updated after this workflow run was created, queue a new run instead of rerunning this one."
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm exec --workspace @oasiz/cli semantic-release
